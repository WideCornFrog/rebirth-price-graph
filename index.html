<div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);

<b>Life Search</b><br>

<input id="lifeInput" type="number" min="0" max="9999" value="0"
style="background:#2a2a2a;color:white;border:1px solid #444;padding:4px;border-radius:4px"
onkeydown="if(event.key==='Enter'){searchLife();}">

<button onclick="searchLife()"
style="background:#0078ff;color:white;border:none;padding:5px 10px;border-radius:4px;margin-left:5px">
Go
</button>

<div id="result" style="margin-top:6px;color:#aaa"></div>
</div>

<script>
function searchLife(){
    var L = parseInt(document.getElementById("lifeInput").value);
    var graph = document.getElementsByClassName("plotly-graph-div")[0];

    var price = graph.data[0].text[L];

    Plotly.relayout(graph,{
        shapes:[{
            type:'line',
            x0:L,
            x1:L,
            y0:0,
            y1:1,
            yref:'paper',
            line:{color:'#ff4444',width:2}
        }]
    });

    document.getElementById("result").innerHTML =
        "Life " + L + " → Price: " + price;
}
</script>
